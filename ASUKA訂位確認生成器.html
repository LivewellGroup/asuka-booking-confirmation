<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASUKA 訂位確認生成器 · 艾旅 LIVEWELL</title>
<style>
  /* ═══ 工具介面樣式 ═══ */
  :root {
    --green: #5C7A5A; --green-dk: #3F5A3E; --green-lt: #E8EFE7;
    --cream: #FAF7F2; --ink: #2A2A2A; --muted: #6B6B6B;
    --line: #D8D4CC; --gold: #9C8654; --gold-bg: #FFF8E8;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Noto Sans TC', 'Segoe UI', 'Microsoft JhengHei', sans-serif;
    background: #EFEDE7; color: var(--ink); height: 100vh; display: flex; flex-direction: column; overflow: hidden;
  }
  header.topbar {
    background: var(--green-dk); color: #fff; padding: 10px 20px;
    display: flex; align-items: center; gap: 16px; flex-shrink: 0;
  }
  .topbar h1 { font-size: 16px; font-weight: 700; letter-spacing: 1px; }
  .topbar .sub { font-size: 12px; opacity: .75; letter-spacing: 2px; }
  .topbar .spacer { flex: 1; }
  .topbar button {
    background: rgba(255,255,255,.12); color: #fff; border: 1px solid rgba(255,255,255,.35);
    padding: 7px 14px; font-size: 13px; cursor: pointer; border-radius: 3px; letter-spacing: 1px;
    font-family: inherit;
  }
  .topbar button:hover { background: rgba(255,255,255,.25); }
  .topbar button.primary { background: var(--gold); border-color: var(--gold); font-weight: 700; }
  .topbar button.primary:hover { background: #b39a63; }
  main { flex: 1; display: flex; min-height: 0; }
  /* ── 左側表單 ── */
  #formPanel {
    width: 430px; flex-shrink: 0; overflow-y: auto; background: #fff;
    border-right: 1px solid var(--line); padding: 14px 16px 60px;
  }
  details.sec { border: 1px solid var(--line); border-radius: 4px; margin-bottom: 10px; background: #fff; }
  details.sec > summary {
    cursor: pointer; padding: 10px 12px; font-size: 14px; font-weight: 700; color: var(--green-dk);
    background: var(--green-lt); border-radius: 3px; list-style: none; display: flex; align-items: center; gap: 8px;
    user-select: none;
  }
  details.sec > summary::before { content: "▸"; font-size: 11px; transition: transform .15s; }
  details.sec[open] > summary::before { transform: rotate(90deg); }
  details.sec .body { padding: 12px; }
  .field { margin-bottom: 10px; }
  .field label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 3px; letter-spacing: .5px; }
  .field input[type=text], .field input[type=date], .field textarea, .field select {
    width: 100%; padding: 7px 9px; font-size: 13.5px; border: 1px solid var(--line); border-radius: 3px;
    font-family: inherit; color: var(--ink); background: #fff;
  }
  .field textarea { resize: vertical; min-height: 56px; line-height: 1.6; }
  .field input:focus, .field textarea:focus, .field select:focus { outline: 2px solid var(--green-lt); border-color: var(--green); }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
  .checkline { display: flex; align-items: center; gap: 7px; font-size: 13.5px; padding: 4px 0; cursor: pointer; }
  .checkline input { width: 15px; height: 15px; accent-color: var(--green); }
  .hint { font-size: 11.5px; color: var(--muted); line-height: 1.5; margin-top: 4px; }
  /* 動態列表 */
  .list-item {
    border: 1px solid var(--line); border-left: 3px solid var(--green); border-radius: 3px;
    padding: 9px 10px 4px; margin-bottom: 8px; position: relative; background: #FCFBF8;
  }
  .list-item .del {
    position: absolute; top: 6px; right: 6px; border: none; background: none; color: #B85042;
    font-size: 15px; cursor: pointer; line-height: 1; padding: 3px 5px;
  }
  .list-item .del:hover { background: #F7E8E5; border-radius: 3px; }
  button.add {
    width: 100%; padding: 7px; border: 1px dashed var(--green); background: none; color: var(--green-dk);
    font-size: 13px; cursor: pointer; border-radius: 3px; font-family: inherit;
  }
  button.add:hover { background: var(--green-lt); }
  .statusToggle { display: flex; gap: 0; border: 1px solid var(--line); border-radius: 4px; overflow: hidden; }
  .statusToggle button {
    flex: 1; padding: 10px; font-size: 14px; font-weight: 700; border: none; background: #fff;
    cursor: pointer; color: var(--muted); font-family: inherit; letter-spacing: 2px;
  }
  .statusToggle button.on-paid { background: var(--green); color: #fff; }
  .statusToggle button.on-unpaid { background: #B85042; color: #fff; }
  /* ── 右側預覽 ── */
  #previewPanel { flex: 1; overflow: auto; padding: 24px; display: flex; justify-content: center; }
  #frameBox { transform-origin: top center; }
  #previewFrame {
    width: 210mm; border: none; background: #fff;
    box-shadow: 0 4px 24px rgba(0,0,0,.18);
  }
</style>
</head>
<body>
<header class="topbar">
  <div>
    <h1>ASUKA 訂位確認生成器</h1>
    <div class="sub">LIVEWELL · BOOKING CONFIRMATION</div>
  </div>
  <div class="spacer"></div>
  <button id="btnReset">重設範例</button>
  <button id="btnLoad">載入 JSON</button>
  <button id="btnSave">儲存 JSON</button>
  <button id="btnPdf" class="primary">下載 PDF</button>
  <input type="file" id="fileInput" accept=".json" style="display:none">
</header>
<main>
  <div id="formPanel"></div>
  <div id="previewPanel"><div id="frameBox"><iframe id="previewFrame" title="A4 預覽"></iframe></div></div>
</main>

const STORAGE_KEY = "asuka-booking-confirm-v2";

/** 相容舊版資料:舊取消規定格式(period/penaltyRate/description)轉為中英對照欄位 */
function normalizeData(d) {
  if (Array.isArray(d.penaltySchedule)) {
    d.penaltySchedule = d.penaltySchedule.map(p => p && "period" in p
      ? { periodEn: "", periodZh: p.period || "", feeEn: p.penaltyRate || "", feeZh: p.description || "" }
      : p);
  }
  // 文件會自動在航程名稱前加船名;若舊資料的航程名稱已手動含船名,去除重複
  if (d.shipName && d.routeName && d.routeName.startsWith(d.shipName)) {
    d.routeName = d.routeName.slice(d.shipName.length).replace(/^[\s・‧·．.、–-]+/, "");
  }
  return d;
}
function loadInitial() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return normalizeData(Object.assign(structuredClone(DEFAULT_DATA), JSON.parse(raw)));
  } catch (e) { /* 忽略壞資料 */ }
  return structuredClone(DEFAULT_DATA);
}

/* ═══════════════ 工具函式 ═══════════════ */
const esc = (t) => String(t ?? "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
const s = (v, fb = "") => (v === null || v === undefined || String(v).trim() === "") ? fb : esc(v);
const nl2br = (t) => esc(t).replace(/\n/g, "<br>");
const pad2 = (n) => String(n).padStart(2, "0");
const CUR_SYMBOL = { JPY: "¥", NTD: "NT$" };
const fmtAmt = (n) => Number(n || 0).toLocaleString("en-US", { maximumFractionDigits: 0 });
const fmtMoney = (cur, n) => `${cur} ${CUR_SYMBOL[cur] || ""}${fmtAmt(n)}`;
const fmtDate = (d) => {
  if (!d) return "—";
  const m = String(d).match(/^(\d{4})-(\d{2})-(\d{2})$/);
  return m ? `${m[1]} 年 ${Number(m[2])} 月 ${Number(m[3])} 日` : esc(d);
};

/** 各幣別 應收/已收/餘額 */
function computeTotals(items) {
  const t = {};
  for (const it of items || []) {
    const cur = it.currency || "JPY";
    if (!t[cur]) t[cur] = { charge: 0, received: 0 };
    const amt = Number(it.amount) || 0;
    if (it.received) t[cur].received += amt; else t[cur].charge += amt;
  }
  for (const cur of Object.keys(t)) t[cur].balance = t[cur].charge - t[cur].received;
  return t;
}

function renderDocument(d) {
  const totals = computeTotals(d.priceItems);
  const curList = Object.keys(totals);
  const unpaid = d.status !== "paid";
  const guestMain = (d.guests && d.guests[0] && (d.guests[0].nameZh || d.guests[0].nameEn)) || "貴賓";

  let pageNo = 0;
  const innerPage = (body) => {
    pageNo += 1;
    return `
    <section class="page">
      ${pageNo > 1 ? `<div class="ph"><span class="ph-left">LIVEWELL GROUP</span><span class="ph-right">BOOKING CONFIRMATION</span></div>` : ""}
      ${body}
      <div class="pf">
        <span class="pf-left">Booking Confirmation · ${esc(guestMain)}</span>
        <span class="pf-num">${pad2(pageNo)}</span>
      </div>
    </section>`;
  };
  const sectionTitle = (eyebrow, title) => `
    <div class="eyebrow">${eyebrow}</div>
    <h2 class="sec-title">${title}</h2>`;

  const pages = [];

  /* ── 第 1 頁:訂位確認 ── */
  const statusStrip = unpaid
    ? `<div class="status-strip unpaid"><span class="st">Option · 待付款</span>${d.paymentDueDate ? `<span class="due">付款到期日<strong>${fmtDate(d.paymentDueDate)}</strong></span>` : ""}</div>`
    : `<div class="status-strip paid"><span class="st">Booking · 已付款</span><span class="due">感謝您的付款，本訂位已確認。</span></div>`;

  const amtRows = (d.priceItems || []).map(it => `
    <tr${it.received ? ` class="received"` : ""}>
      <td>${s(it.label, "—")}${it.received ? "（已收）" : ""}</td>
      <td class="c">${s(it.currency, "JPY")}</td>
      <td class="r money">${CUR_SYMBOL[it.currency] || ""}${fmtAmt(it.amount)}</td>
    </tr>`).join("");

  // 有已收金額時,金額區顯示 總計/已收金額/應付餘款 三列;否則只列總計。
  // 標籤用中文四字寬對齊,金額僅帶幣別符號;多幣別時於總計標籤註記幣別。
  const plainMoney = (cur, n) => `${CUR_SYMBOL[cur] || cur + " "}${fmtAmt(n)}`;
  const totalBlocks = `<div class="amt-totals">${curList.map(cur => {
    const t = totals[cur];
    const curTag = curList.length > 1 ? `（${cur}）` : "";
    let rows = `<div class="trow total"><span class="k">總　　計${curTag}</span><span class="v">${plainMoney(cur, t.charge)}</span></div>`;
    if (t.received > 0) {
      rows += `<div class="trow"><span class="k">已收金額</span><span class="v">${plainMoney(cur, t.received)}</span></div>`;
      if (unpaid && t.balance > 0) rows += `<div class="trow balance"><span class="k">應付餘款</span><span class="v">${plainMoney(cur, t.balance)}</span></div>`;
    }
    return rows;
  }).join("")}</div>`;

  const cell = (label, valueHtml, cls = "") => `<div class="cell ${cls}"><div class="label">${label}</div><div class="v">${valueHtml}</div></div>`;

  const amountSection = `
    <div class="mini-head"><span class="t">AMOUNT · 金額</span><span class="rule"></span></div>
    <table class="amt-table">
      <thead><tr><th>項目 DESCRIPTION</th><th class="c" style="width:22mm;">幣別</th><th class="r" style="width:40mm;">金額 AMOUNT</th></tr></thead>
      <tbody>${amtRows || `<tr><td colspan="3" style="color:var(--muted);">尚未填寫</td></tr>`}</tbody>
    </table>
    ${totalBlocks}
    ${d.amountNote ? `<div class="amt-note">${nl2br(d.amountNote)}</div>` : ""}
    ${d.notes ? `<hr class="divider"><div class="mini-head"><span class="t">REMARKS · 備註</span><span class="rule"></span></div><div style="font-size:10.5pt;line-height:1.8;">${nl2br(d.notes)}</div>` : ""}`;

  // 估算第 1 頁內容高度(px),超出 A4 可用範圍時金額區自動移到獨立頁。
  // 常數為實測值:頁首85+標題列98+狀態列90+航程區160+房型區120=553,
  // 訂位人列 39px/列(兩欄)、金額列 40px/列、總計列 30/28/52px。可用高度 ~1008px。
  const guestCount = Math.max((d.guests || []).length, 1);
  const itemCount = Math.max((d.priceItems || []).length, 1);
  const lines = (t) => (t ? String(t).split("\n").length : 0);
  let totalsPx = 8;
  for (const c of curList) {
    totalsPx += 30;
    if (totals[c].received > 0) {
      totalsPx += 28;
      if (unpaid && totals[c].balance > 0) totalsPx += 30;
    }
  }

/* ═══════════════ 表單 UI ═══════════════ */
const formPanel = document.getElementById("formPanel");

function fld(label, path, opts = {}) {
  const v = getPath(path);
  const type = opts.type || "text";
  if (type === "textarea")
    return `<div class="field"><label>${label}</label><textarea data-bind="${path}"${opts.rows ? ` rows="${opts.rows}"` : ""}>${esc(v)}</textarea></div>`;
  return `<div class="field"><label>${label}</label><input type="${type}" data-bind="${path}" value="${esc(v)}"></div>`;
}
function check(label, path) {
  return `<label class="checkline"><input type="checkbox" data-bind="${path}"${getPath(path) ? " checked" : ""}> ${label}</label>`;
}
function getPath(path) {
  return path.split(".").reduce((o, k) => (o == null ? o : o[/^\d+$/.test(k) ? Number(k) : k]), data);
}
function setPath(path, value) {
  const keys = path.split(".");
  let o = data;
  for (let i = 0; i < keys.length - 1; i++) o = o[/^\d+$/.test(keys[i]) ? Number(keys[i]) : keys[i]];
  const last = keys[keys.length - 1];
  o[/^\d+$/.test(last) ? Number(last) : last] = value;
}

function bankFields(prefix) {
  return `
    ${fld("卡片標題", prefix + ".title")}
    ${fld("BANK 銀行名稱", prefix + ".bankName")}
    ${fld("BRANCH 分行名稱", prefix + ".branchName")}
    ${fld("ACCOUNT NAME 戶名", prefix + ".accountName")}
    <div class="row2">
      ${fld("SWIFT CODE", prefix + ".swiftCode")}
      ${fld("ACCOUNT NUMBER 帳號", prefix + ".accountNo")}
    </div>
    ${fld("REFERENCE 備註(留空不顯示)", prefix + ".reference")}`;
}

// 輸入事件(委派)
formPanel.addEventListener("input", (e) => {
  const el = e.target;
  const path = el.dataset.bind;
  if (!path) return;
  let val;
  if (el.type === "checkbox") val = el.checked;
  else if (el.dataset.boolean) val = el.value === "1";
  else val = el.value;
  if (path.startsWith("priceItems.") && path.endsWith(".amount")) {
    val = Number(String(val).replace(/[,，\s]/g, "")) || 0;
  }
  setPath(path, val);
  schedulePreview();
  scheduleStore();
});

/* ═══════════════ 預覽/儲存 ═══════════════ */
const previewFrame = document.getElementById("previewFrame");
let previewTimer = null, storeTimer = null;

function renderPreview() {
  const html = renderDocument(data);
  const doc = previewFrame.contentDocument;
  doc.open(); doc.write(html); doc.close();
  // iframe 高度 = 文件頁數,更新後重算縮放
  setTimeout(() => {
    try { previewFrame.style.height = doc.body.scrollHeight + "px"; } catch (e) {}
    fitPreview();
  }, 80);
}
function schedulePreview() { clearTimeout(previewTimer); previewTimer = setTimeout(renderPreview, 600); }
function scheduleStore() {
  clearTimeout(storeTimer);
  storeTimer = setTimeout(() => { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch (e) {} }, 800);
}
function refresh(rerenderForm) {
  if (rerenderForm) renderForm();
  schedulePreview();
  scheduleStore();
}

// 預覽縮放
function fitPreview() {
  const panel = document.getElementById("previewPanel");
  const box = document.getElementById("frameBox");
  const a4px = 210 * 96 / 25.4; // 210mm → px
  const avail = panel.clientWidth - 48;
  const scale = Math.min(1, avail / a4px);
  box.style.transform = `scale(${scale})`;
  box.style.height = (previewFrame.offsetHeight * scale) + "px";
}
window.addEventListener("resize", fitPreview);

/* ═══════════════ 工具列 ═══════════════ */
document.getElementById("btnPdf").onclick = () => {
  const w = window.open("", "_blank");
  if (!w) { alert("請允許彈出視窗以下載 PDF"); return; }
  w.document.open(); w.document.write(renderDocument(data)); w.document.close();
  // 等字型與版面載入後叫出列印(另存 PDF)
  setTimeout(() => { try { w.focus(); w.print(); } catch (e) {} }, 900);
};
document.getElementById("btnSave").onclick = () => {
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = `ASUKA訂位確認_${(data.guests && data.guests[0] && data.guests[0].nameZh) || data.routeName || "未命名"}.json`;
  a.click();
  URL.revokeObjectURL(a.href);
};
document.getElementById("btnLoad").onclick = () => document.getElementById("fileInput").click();
document.getElementById("fileInput").addEventListener("change", (e) => {
  const f = e.target.files[0];
  if (!f) return;
  const r = new FileReader();
  r.onload = () => {
    try {
      data = normalizeData(Object.assign(structuredClone(DEFAULT_DATA), JSON.parse(r.result)));
      refresh(true);
    } catch (err) { alert("JSON 格式錯誤,無法載入。"); }
  };
  r.readAsText(f);
  e.target.value = "";
});
document.getElementById("btnReset").onclick = () => {
  if (!confirm("確定要清除目前內容,回到範例資料嗎?")) return;
  data = structuredClone(DEFAULT_DATA);
  localStorage.removeItem(STORAGE_KEY);
  refresh(true);
};

/* ═══════════════ 啟動 ═══════════════ */
renderForm();
renderPreview();
setTimeout(fitPreview, 200);
</script>
</body>
</html>
